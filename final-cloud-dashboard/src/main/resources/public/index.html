<script>
  Vue.createApp({
    data() {
      return {
        //filter: $.cookie('sidebar-filter'),
        //color: $.cookie('sidebar-color'),
        //mini: $.cookie('sidebar_mini'),
        page: {
          collection: "",
          paths: ["README"],
          title: "",
          menus: [],
          module: "",
        },
        modules: [{"id":"docs","name":"Docs","logo":"/assets/images/logos/github.svg","link":"/docs/zh/overview"},{"id":"spring","logo":"/assets/images/logos/spring.svg","name":"Spring","link":"/spring/zh/overview"}],
        theme: "light",
        sidebar: null
      }
    },
    mounted() {

      this.page.menus = this.page.paths.slice(1);

      console.log(this.sidebar);
      console.log(this.page.paths);
      console.log(this.page.menus);
    }
  })
  .mount('#sidebar');

  Vue.createApp({
    data() {
      return {
        resources: [],
        selectedResource: window.localStorage.getItem("resource")
      }
    },
    watch: {
      selectedResource() {
        console.log("resource:" + this.selectedResource);
        window.localStorage.setItem("resource", this.selectedResource);
        window.location.reload();
      }
    },

    mounted() {
      this.loadResources();
    },

    methods: {
      loadResources() {
        let $this = this;
        axios.get('/resources')
        .then(function (response) {
          console.log(response.data);
          $this.resources = response.data.data;

          if ($this.selectedResource == null) {
            $this.selectedResource = $this.resources[0].name;
          }

        });
      },
      changeResource(resource) {
        this.selectedResource = resource.name;
        window.localStorage.setItem("resourcePath",resource.path);
      }
    }

  })
  .mount('#navbar');
</script>
<script>
$(document).ready(function () {
   let domain = "";
  $('a').each(function () {
    let $a = $(this);
    let href = $a.attr('href');

    if (href !== undefined && href.indexOf('http') == -1) {
      if (href.indexOf('.md') !== -1) {
        // 以 .md 结尾的，替换为 .html
        // 将链接中的 README 替换为 index
        href = href.replace('README', 'index');
        href = href.substr(0, href.length - 3).concat('.html');
      }

      if (href.indexOf('.java') !== -1) {
        href = domain + href;
      }

      if (href.indexOf('.vm') !== -1) {
        href = domain + href;
      }

      if (href.indexOf('\/_') !== -1) {
                href = href.replace(/\/_/g,'/');
            }

           $a.attr('href',href);
       }

   });

   $('a[href^="http"]').each(function () {
       $(this).attr('target', '_blank');
   });
});
</script>
